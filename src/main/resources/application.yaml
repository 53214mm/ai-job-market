spring:
  application:
    name: ai-job-market
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen-max
# pgvector向量数据库配置
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
    mcp:
      client:
        sse:
          connections:
            mxai-mcp-server:
              url: https://mcp.mxai.cn
              sse-endpoint: /sse
    datasource:
      username: root
      password: 123456
      url: jdbc:mysql://localhost:3306/ai_job_market?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      driver-class-name: com.mysql.cj.jdbc.Driver

  # 1. Redis 核心配置
  data:
    redis:
      host: localhost          # 你的 Redis 地址
      port: 6379               # 端口
      password: '123456'       # 没有密码留空
      database: 1              # 使用 1 号库
      timeout: 5000
      connect-timeout: 5000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 自定义 Redis 对话记忆配置
chat-memory:
  redis:
    key-prefix: "chat:memory:"  # 对话历史 key 前缀
    ttl-days: 7                 # 对话历史过期天数，默认7天

jwt:
  secret: ai-job-market-secret-key-2026-must-be-long-enough
  expiration-ms: 604800000  # 7天

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    persist-authorization: true
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.li.ai_job_market.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-authorize: true
  documents:
    - group: default
      name: 默认分组
      locations: classpath:document/*
